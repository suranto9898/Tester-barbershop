<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbershop Classic | Booking Online</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bs-red: #e63946;
            --bs-blue: #1d3557;
            --bs-white: #f1faee;
            --bs-dark: #111;
        }

        body { font-family: 'Poppins', sans-serif; background-color: var(--bs-white); margin: 0; padding-bottom: 50px; }
        
        .header-stripe {
            height: 10px;
            background: repeating-linear-gradient(45deg, var(--bs-red), var(--bs-red) 20px, #fff 20px, #fff 40px, var(--bs-blue) 40px, var(--bs-blue) 60px, #fff 60px, #fff 80px);
            position: relative; z-index: 100;
        }

        /* SLIDESHOW CORE */
        .slideshow-container {
            width: 100%;
            height: 300px;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        .slideshow-container img.bg-slide {
            width: 100%; height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0; left: 0;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            z-index: 1;
        }

        .slideshow-container img.bg-slide.active { opacity: 0.6; }

        .slideshow-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7));
            z-index: 2;
        }

        /* HEADER CONTENT (LOGO & TEXT) */
        .header-content {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10; text-align: center; color: white;
        }

        .logo-bisnis {
            width: 100px; height: 100px;
            object-fit: cover; border-radius: 50%;
            border: 3px solid var(--bs-red);
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            margin-top: 20px;
        }

        .header-content h1 { 
            margin: 10px 0 0 0; font-size: 24px; 
            letter-spacing: 3px; font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        .running-text {
            position: absolute; top: 0; width: 100%;
            background: var(--bs-blue); color: white;
            padding: 8px 0; font-size: 13px; font-weight: 600;
            z-index: 11; border-bottom: 2px solid var(--bs-red);
        }

        /* BADGES */
        .status-badge {
            padding: 5px 12px; border-radius: 20px; font-size: 10px;
            font-weight: 800; margin-top: 10px;
        }
        .status-open { background: #2ecc71; color: white; }
        .status-closed { background: var(--bs-red); color: white; }

        .hero-info {
            background: var(--bs-blue); color: white;
            padding: 12px; margin: -25px 20px 20px;
            border-radius: 12px; position: relative; z-index: 20;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-size: 11px; text-align: center;
        }

        /* FORM STYLING */
        .booking-container { padding: 20px; max-width: 500px; margin: auto; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 800; margin-bottom: 8px; color: var(--bs-blue); text-transform: uppercase; }
        
        input, select, .service-trigger { 
            width: 100%; padding: 14px; border: 1.5px solid #ddd; border-radius: 10px; 
            font-size: 14px; box-sizing: border-box; background: white;
        }

        /* SERVICES LIST */
        #service-list-container { 
            display: none; gap: 8px; margin-top: 10px; 
            max-height: 350px; overflow-y: auto; padding: 10px;
            background: #f8f9fa; border-radius: 12px; border: 1px solid #eee;
        }

        .service-item {
            background: white; border: 1.5px solid #eee; border-radius: 12px;
            padding: 15px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; transition: 0.3s;
        }
        .service-item.selected { border-color: var(--bs-red); background: #fff5f5; transform: scale(1.01); }

        .service-name { font-size: 15px; font-weight: 700; color: var(--bs-blue); }
        .service-desc { font-size: 11px; color: #777; margin-top: 2px; }
        .category-tag { font-size: 9px; background: #eee; padding: 2px 6px; border-radius: 4px; font-weight: 700; margin-top: 5px; display: inline-block; }

        .price-container { text-align: right; }
        .old-price { font-size: 10px; color: #aaa; text-decoration: line-through; display: block; }
        .promo-price { font-weight: 800; color: var(--bs-red); font-size: 14px; }
        .promo-tag { background: var(--bs-red); color: white; font-size: 8px; padding: 2px 5px; border-radius: 3px; font-weight: 800; margin-top: 4px; display: inline-block; }

        /* LOOKBOOK SLIDER */
        .lookbook-slider { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .lookbook-slider::-webkit-scrollbar { display: none; }
        .lookbook-item { flex: 0 0 200px; height: 150px; border-radius: 12px; overflow: hidden; position: relative; }
        .lookbook-item img { width: 100%; height: 100%; object-fit: cover; }
        .lookbook-tag { position: absolute; bottom: 0; width: 100%; background: rgba(29,53,87,0.8); color: white; font-size: 10px; padding: 5px 0; text-align: center; }

        .btn-confirm {
            background: var(--bs-blue); color: white; width: 100%; padding: 16px;
            border: none; border-radius: 12px; font-weight: 800; font-size: 15px;
            cursor: pointer; margin-top: 20px; box-shadow: 0 4px 15px rgba(29,53,87,0.3);
        }

        /* SKELETON */
        .skeleton { height: 70px; background: #eee; border-radius: 10px; margin-bottom: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* FOOTER */
        .social-footer { display: flex; justify-content: center; gap: 20px; margin: 30px 0 10px; }
        .social-icon { width: 45px; height: 45px; background: white; color: var(--bs-blue); display: flex; align-items: center; justify-content: center; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-decoration: none; font-size: 20px; transition: 0.3s; }
        .social-icon:active { transform: scale(0.9); background: var(--bs-blue); color: white; }

        footer { text-align: center; padding: 20px; font-size: 9px; color: #bbb; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="header-stripe"></div>

<div class="slideshow-container">
    <div class="running-text">
        <marquee scrollamount="6">✂️ SELAMAT DATANG DI CLASSIC BARBER &nbsp;&nbsp; — &nbsp;&nbsp; POTONGAN RAMBUT TERBAIK &nbsp;&nbsp; — &nbsp;&nbsp; GENTLEMAN'S CHOICE ✂️</marquee>
    </div>

    <div class="slideshow-overlay"></div>
    
    <img src="toko1.jpg" class="bg-slide active">
    <img src="toko2.jpg" class="bg-slide">
    <img src="toko3.jpg" class="bg-slide">
    <img src="toko4.jpg" class="bg-slide">
    <img src="toko5.jpg" class="bg-slide">

    <div class="header-content">
        <img src="logo.jpg" alt="Logo" class="logo-bisnis">
        <h1>CLASSIC BARBER</h1>
        <div id="shop-status" class="status-badge">Checking...</div>
    </div>
</div>

<div class="hero-info">
    <i class="fas fa-clock"></i> Sen - Sab: 10:00 - 17:00 | <i class="fas fa-calendar-times"></i> Minggu: Libur
</div>

<div class="booking-container">
    <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="cust-name" placeholder="Siapa nama Anda?">
    </div>

    <div class="form-group">
        <label>Pilih Capster</label>
        <select id="barber-select">
            <option value="">⏳ Memuat Capster...</option>
        </select>
    </div>

    <div class="form-group">
        <label>Layanan</label>
        <div class="service-trigger" onclick="toggleServices()" style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
            <span id="selected-count">Pilih layanan...</span>
            <i class="fas fa-chevron-down"></i>
        </div>
        <div id="service-list-container"></div>
    </div>

    <div class="form-group">
        <label>Jadwal</label>
        <div style="display: flex; gap: 10px;">
            <input type="date" id="book-date">
            <input type="time" id="book-time">
        </div>
    </div>

    <div class="lookbook-slider">
        <div class="lookbook-item"><img src="foto1.jpg"><div class="lookbook-tag">Classic Fade</div></div>
        <div class="lookbook-item"><img src="foto2.jpg"><div class="lookbook-tag">Pompadour</div></div>
        <div class="lookbook-item"><img src="foto3.jpg"><div class="lookbook-tag">Buzz Cut</div></div>
        <div class="lookbook-item"><img src="foto4.jpg"><div class="lookbook-tag">Beard Style</div></div>
    </div>

    <button class="btn-confirm" onclick="sendBooking()">BOOKING SEKARANG</button>

    <div class="social-footer">
        <a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
        <a href="#" class="social-icon"><i class="fab fa-tiktok"></i></a>
        <a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
    </div>

    <footer>
        &copy; 2026 Classic Barber Shop <br> Established for Gentlemen
    </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
const CONFIG = {
    CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTGkzZ2slHcpFkUQ7ubQIIH8fKs3eRxI752j-rIP6_OSdEaIedyLn0fC1MvRgGZVnEcUcPEhnpFYwIe/pub?output=csv",
    WA_PHONE: "6285725493220"
};

let selectedServices = [];

// --- 1. SLIDESHOW LOGIC ---
function startSlideshow() {
    const slides = document.querySelectorAll('.bg-slide');
    let current = 0;
    setInterval(() => {
        slides[current].classList.remove('active');
        current = (current + 1) % slides.length;
        slides[current].classList.add('active');
    }, 5000);
}

// --- 2. DATA FETCHING ---
async function fetchData() {
    const container = document.getElementById('service-list-container');
    container.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';
    
    try {
        const response = await fetch(CONFIG.CSV_URL);
        const csvString = await response.text();
        Papa.parse(csvString, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                const barberSelect = document.getElementById('barber-select');
                container.innerHTML = ""; 
                barberSelect.innerHTML = '<option value="Siapa Saja">💈 Siapa Saja (Tersedia)</option>';

                data.forEach(item => {
                    if(item.nama && item.harga) {
                        const hAsli = parseInt(item.harga);
                        const hPromo = parseInt(item.promo) || 0;
                        const labelLayanan = `${item.nama} [${item.kategori || 'UMUM'}] (Rp ${(hPromo > 0 ? hPromo : hAsli).toLocaleString()})`;

                        const card = document.createElement('div');
                        card.className = 'service-item';
                        card.onclick = () => selectService(card, labelLayanan);
                        
                        let priceHTML = hPromo > 0 
                            ? `<div class="price-container"><span class="old-price">Rp ${hAsli.toLocaleString()}</span><span class="promo-price">Rp ${hPromo.toLocaleString()}</span><span class="promo-tag">${item.promo_tag || 'PROMO'}</span></div>`
                            : `<div class="price-container"><span class="promo-price">Rp ${hAsli.toLocaleString()}</span></div>`;

                        card.innerHTML = `
                            <div>
                                <div class="service-name">${item.nama}</div>
                                <div class="service-desc">${item.layanan || 'Premium Service'}</div>
                                <span class="category-tag">${item.kategori || 'UMUM'}</span>
                            </div>
                            ${priceHTML}`;
                        container.appendChild(card);
                    }
                    if(item.nama_barber) {
                        const opt = document.createElement('option');
                        opt.value = item.nama_barber;
                        opt.innerText = "💈 Barber " + item.nama_barber;
                        barberSelect.appendChild(opt);
                    }
                });
            }
        });
    } catch (e) { console.error(e); }
}

// --- 3. UI FUNCTIONS ---
function toggleServices() {
    const c = document.getElementById('service-list-container');
    const isHidden = c.style.display === "none" || c.style.display === "";
    c.style.display = isHidden ? "grid" : "none";
    document.querySelector('.service-trigger i').style.transform = isHidden ? "rotate(180deg)" : "rotate(0deg)";
}

function selectService(el, str) {
    if (selectedServices.includes(str)) {
        selectedServices = selectedServices.filter(i => i !== str);
        el.classList.remove('selected');
    } else {
        selectedServices.push(str);
        el.classList.add('selected');
    }
    document.getElementById('selected-count').innerText = selectedServices.length > 0 ? `${selectedServices.length} Layanan Dipilih` : "Pilih layanan...";
}

function updateShopStatus() {
    const el = document.getElementById('shop-status');
    const now = new Date();
    const day = now.getDay();
    const hr = now.getHours();
    const open = (day >= 1 && day <= 6) && (hr >= 10 && hr < 17);
    el.innerText = open ? "● SEKARANG BUKA" : "● SEKARANG TUTUP";
    el.className = "status-badge " + (open ? "status-open" : "status-closed");
}

function sendBooking() {
    const name = document.getElementById('cust-name').value;
    const barber = document.getElementById('barber-select').value;
    const date = document.getElementById('book-date').value;
    const time = document.getElementById('book-time').value;

    if(!name || !date || !time || selectedServices.length === 0) {
        alert("Lengkapi data booking!"); return;
    }

    const pesan = `*RESERVASI CLASSIC BARBER*\n--------------------------\n*Nama:* ${name}\n*Barber:* ${barber}\n*Layanan:* ${selectedServices.join(', ')}\n*Jadwal:* ${date} @ ${time}\n--------------------------`;
    window.open(`https://wa.me/${CONFIG.WA_PHONE}?text=${encodeURIComponent(pesan)}`, '_blank');
}

// INIT
startSlideshow();
fetchData();
updateShopStatus();
</script>
</body>
</html>
